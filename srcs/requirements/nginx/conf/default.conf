#context server "a virtual host" this is called insed the http context in the /etc/nginx/nginx.conf 
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name localhost;

    # we need the signed certification for HTTPS  both the self-signed and key
    # self signed cetif is sent to the client it containes also the public key ( signed with the server public key)
    ssl_certificate /etc/nginx/ssl/self-signed.crt;
    # key is the private key 
    ssl_certificate_key /etc/nginx/ssl/self-signed.key;
    
    # forcing to use the lattest TLS versions
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    # since NGINX cant execute or read PHP files

    root /var/www/html; # where the file lives on Disk
    index index.php index.html; # files to serve by default 

    # location context used here to handle files or dirrectory
    # example : site.com/about  . looking if there is a file called about or dirrectory 
    # if both failed , Nginx forward the request to wordpress  
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # How NGINX talks to WordPress
    location ~ \.php$ {
        # DNS 'wordpress' is the name of the container, 9000 is the port
        # forwart the request to wordpress
        fastcgi_pass wordpress:9000; 
        
        fastcgi_index index.php;
        
        include fastcgi_params;
        
        # fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param SCRIPT_FILENAME /var/www/html/$fastcgi_script_name;

    }

}
