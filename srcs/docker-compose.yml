services:
  mariadb:
    image: "mariadb:inception"
    build: 
      context: ./mariadb
      dockerfile: Dockerfile
    container_name: mariadb_app
    ports:
      - 3306:3306
      # host_port:container_port 
    volumes:
      - db_vol:/var/lib/mysql
    networks:
      - inception_net
    env_file:
      - .env
